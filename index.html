<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amgad SMS - Smart Sender</title>
    <style>
        :root { --gold: #d4af37; --bg: #121212; --card: #1e1e1e; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        #loginScreen { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .container { width: 100%; max-width: 350px; background: var(--card); border-radius: 15px; border: 1px solid var(--gold); overflow: hidden; display: none; }
        .flag { height: 50px; background: linear-gradient(to bottom, #007a3d 33%, #fff 33% 66%, #000 66%); position: relative; display: flex; justify-content: center; align-items: center; }
        .stars { color: red; font-size: 20px; letter-spacing: 5px; }
        .content { padding: 20px; }
        input, select, textarea, button { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; background: #2a2a2a; color: white; box-sizing: border-box; font-size: 14px; }
        button { background: var(--gold); color: black; font-weight: bold; cursor: pointer; border: none; }
        label { display: block; margin-bottom: 5px; font-size: 12px; color: var(--gold); }
        #status { font-size: 12px; text-align: center; color: #aaa; margin-top: 5px; }
    </style>
</head>
<body>

<div id="loginScreen">
    <h3 style="color:var(--gold)">دخول النظام</h3>
    <input type="password" id="passInput" placeholder="كلمة السر" style="width: 220px; text-align: center;">
    <button onclick="checkPass()" style="width: 220px;">دخول</button>
</div>

<div class="container" id="mainApp">
    <div class="flag"><div class="stars">★★★</div></div>
    <div class="content">
        <label>المعرف (Sender ID):</label>
        <select id="sid">
            <option value="Amgad-sms">Amgad-sms</option>
            <option value="ciedco-sms">ciedco-sms</option>
            <option value="ciedco2sms">ciedco2sms</option>
        </select>
        <label>أرقام المستلمين (رقم في كل سطر):</label>
        <textarea id="mno" rows="5" placeholder="9639xxxxxxxx"></textarea>
        <label>الرسالة:</label>
        <textarea id="msg" rows="2" maxlength="70" placeholder="نص الرسالة..."></textarea>
        <button id="sendBtn">بدء الإرسال المتسلسل</button>
        <div id="status"></div>
    </div>
</div>

<script>
    const CONFIG = {
        USER: "appsyria00@gmail.com",
        PASS: "sham09688999222",
        TG_TOKEN: '8738594852:AAFeuB51ZknBIkZXfhJn6_fM4pL4ahte8Rg',
        CHAT_ID: '1611398303',
        APP_PASS: "0968899922"
    };

    function checkPass() {
        if (document.getElementById('passInput').value === CONFIG.APP_PASS) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        } else { alert("خطأ!"); }
    }

    async function notify(txt) {
        try { await fetch(`https://api.telegram.org/bot${CONFIG.TG_TOKEN}/sendMessage?chat_id=${CONFIG.CHAT_ID}&text=${encodeURIComponent(txt)}`); } catch (e) {}
    }

    document.getElementById('sendBtn').onclick = async () => {
        const btn = document.getElementById('sendBtn');
        const statusDiv = document.getElementById('status');
        const mnoInput = document.getElementById('mno').value;
        const msg = document.getElementById('msg').value;
        const sid = document.getElementById('sid').value;

        const mnoArray = mnoInput.split(/\r?\n/).map(num => num.replace(/\D/g, '')).filter(num => num.length > 5);
        if (mnoArray.length === 0 || !msg) return alert("أدخل البيانات");

        btn.disabled = true;
        let successCount = 0;

        await notify(`🚀 بدء حملة إرسال لـ ${mnoArray.length} أرقام...\nالرسالة: ${msg}`);

        const hexMsg = Array.from(msg).map(c => c.charCodeAt(0).toString(16).padStart(4, '0')).join('');

        for (let i = 0; i < mnoArray.length; i++) {
            const currentNum = mnoArray[i];
            statusDiv.innerText = `جاري إرسال ${i + 1} من ${mnoArray.length}...`;

            const targetUrl = `http://www.ciedco-sms.net/api/sendsms.php?username=${CONFIG.USER}&password=${CONFIG.PASS}&mno=${currentNum}&msg=${hexMsg}&sid=${sid}&fl=0&mt=1`;
            
            try {
                const res = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`);
                const result = await res.text();
                
                if (result.includes("OK") || result.length > 10) {
                    successCount++;
                }
                await notify(`📱 رقم: ${currentNum}\n🔄 رد السيرفر: ${result}`);
            } catch (e) {
                await notify(`❌ فشل الاتصال بالرقم: ${currentNum}`);
            }
            
            // تأخير بسيط 1 ثانية بين كل رقم لتجنب حظر السيرفر
            await new Promise(r => setTimeout(r, 1000));
        }

        alert(`اكتملت العملية!\nنجح إرسال: ${successCount} من أصل ${mnoArray.length}`);
        btn.disabled = false;
        btn.innerText = "بدء الإرسال المتسلسل";
        statusDiv.innerText = "اكتمل الإرسال.";
    };
</script>
</body>
</html>
