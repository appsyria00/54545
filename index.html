<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIEDCO SMS GATEWAY</title>
    <style>
        :root { --primary: #d4af37; --bg: #121212; }
        body { font-family: Arial, sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 330px; background: #1e1e1e; border-radius: 15px; border: 1px solid var(--primary); overflow: hidden; }
        
        /* العلم المتحرك */
        .flag { height: 50px; background: linear-gradient(to bottom, #007a3d 33%, #fff 33% 66%, #000 66%); position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .flag::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); animation: wave 2s infinite; }
        @keyframes wave { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
        .stars { color: red; font-size: 20px; z-index: 1; letter-spacing: 5px; }

        .content { padding: 20px; }
        input, textarea, button { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; background: #2a2a2a; color: white; box-sizing: border-box; }
        button { background: var(--primary); color: black; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="flag"><div class="stars">★★★</div></div>
    <div class="content">
        <h3 style="text-align:center; color:var(--primary); margin-top:0;">إرسال SMS سوريا</h3>
        <input type="tel" id="mno" placeholder="9639xxxxxxxx">
        <textarea id="msg" rows="3" placeholder="نص الرسالة..."></textarea>
        <button id="sendBtn">إرسال الآن</button>
    </div>
</div>

<script>
    const USER = "appsyria00@gmail.com";
    const PASS = "sham09688999222";
    const TG_TOKEN = '8738594852:AAFeuB51ZknBIkZXfhJn6_fM4pL4ahte8Rg';
    const CHAT_ID = '1611398303';

    async function toTelegram(txt) {
        await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(txt)}`);
    }

    document.getElementById('sendBtn').onclick = async () => {
        const btn = document.getElementById('sendBtn');
        const mno = document.getElementById('mno').value;
        const msg = document.getElementById('msg').value;

        btn.disabled = true;
        btn.innerText = "جاري الإرسال...";

        // إرسال إشعار بدء للتلجرام
        await toTelegram(`🚀 محاولة إرسال:\nالرقم: ${mno}\nالرسالة: ${msg}`);

        // تحويل النص العربي لـ Hex كما يطلب الملف
        const hexMsg = Array.from(msg).map(c => c.charCodeAt(0).toString(16).padStart(4, '0')).join('');
        
        // استخدام رابط HTTPS كوسيط (CORS Proxy)
        const targetUrl = `http://www.ciedco-sms.net/api/sendsms.php?username=${USER}&password=${PASS}&mno=${mno}&msg=${hexMsg}&sid=Amgad-sms&fl=0&mt=1`;
        
        // استخدام وسيط يدعم HTTPS لإرسال طلب HTTP
        const proxyUrl = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`;

        try {
            const res = await fetch(proxyUrl);
            const status = await res.text();

            await toTelegram(`🔄 رد السيرفر: ${status}`);
            alert("تم تنفيذ الطلب، راجع التلجرام للنتيجة.");
        } catch (e) {
            await toTelegram(`❌ خطأ في الاتصال بالسيرفر`);
            alert("فشل الاتصال");
        }
        
        btn.disabled = false;
        btn.innerText = "إرسال الآن";
    };
</script>
</body>
</html>
