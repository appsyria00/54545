<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سيرفر رسائل أبراج سوريا</title>
    <style>
        :root { --gold: #d4af37; --bg: #121212; --card: #1e1e1e; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .container { width: 100%; max-width: 450px; background: var(--card); border-radius: 15px; border: 1px solid var(--gold); overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
        .sidebar { background: #252525; padding: 15px; border-bottom: 1px solid var(--gold); display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .user-tag { background: var(--gold); color: black; padding: 2px 8px; border-radius: 4px; font-weight: bold; margin-left: 5px; }
        .content { padding: 20px; text-align: center; }
        input, select, textarea, button { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #333; background: #2a2a2a; color: white; box-sizing: border-box; font-size: 14px; outline: none; }
        input:focus { border-color: var(--gold); }
        button { background: var(--gold); color: black; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        button:disabled { background: #555; cursor: not-allowed; }
        label { display: block; text-align: right; margin-bottom: 5px; font-size: 12px; color: var(--gold); }
    </style>
</head>
<body>

<div id="loginSection" class="container">
    <div class="content">
        <h2 style="color:var(--gold); margin-bottom: 5px;"> سيرفر رسائل أبراج سوريا </h2>
        <p style="font-size: 12px; color: #888;">نظام الإرسال السحابي الآمن</p>
        <input type="tel" id="userPhone" placeholder="963968899922" style="text-align: center;">
        <button id="otpBtn" onclick="sendOTP()">إرسال كود التحقق</button>
    </div>
</div>

<div id="otpSection" class="container hidden">
    <div class="content">
        <h3 style="color:var(--gold)">تأكيد الهوية</h3>
        <input type="number" id="otpInput" placeholder="----" style="text-align: center; font-size: 24px; letter-spacing: 10px;">
        <button onclick="verifyOTP()">تأكيد الدخول</button>
    </div>
</div>

<div id="mainApp" class="container hidden">
    <div class="sidebar">
        <div><span class="user-tag" id="displayName">..</span><span id="displayNum"></span></div>
        <div>رصيدك: <b id="displayLimit" style="color:var(--gold); font-size: 16px;">..</b></div>
    </div>
    <div class="content">
        <label>نوع الخدمة (المعرف):</label>
        <select id="sid">
            <option value="Amgad-sms">Amgad-sms (رسائل فردية وجماعية)</option>
            <option value="ciedco-sms">ciedco-sms (رسائل فردية)</option>
            <option value="ciedco2sms">ciedco2sms (رسائل جماعية)</option>
        </select>
        <label>أرقام المستلمين (9639xxxxxxxx):</label>
        <textarea id="mno" rows="4" placeholder="أدخل الأرقام هنا..."></textarea>
        <label>نص الرسالة:</label>
        <textarea id="msg" rows="2" maxlength="70" placeholder="اكتب رسالتك هنا..."></textarea>
        <button id="sendBtn">بدء الإرسال الآن</button>
        <div id="status" style="font-size: 12px; color: var(--gold); margin-top: 5px; font-weight: bold;"></div>
    </div>
</div>

<script>
    // الرابط الجديد الذي قمت بإنشائه
    const _0xS = "https://script.google.com/macros/s/AKfycbyilUhWlvVSHmEDouSuTSlQ1YP7WxiflwVszS72w2w1ByTccA96tzkhWRBeNfd4kXUh/exec";
    
    let gOTP, cPhone, uLimit, uName, uCr, pCr;

    async function report(m) {
        try { fetch(`${_0xS}?action=report&msg=${encodeURIComponent(m)}`); } catch(e) {}
    }

    async function sendOTP() {
        const p = document.getElementById('userPhone').value.trim();
        const b = document.getElementById('otpBtn');
        if(p.length !== 12 || !p.startsWith('963')) return alert("الرقم يجب أن يكون 12 خانة ويبدأ بـ 963");
        
        b.disabled = true; b.innerText = "جاري الفحص...";
        try {
            const r = await fetch(`${_0xS}?phone=${p}&action=get`);
            const d = await r.json();
            if (d !== "NotFound") {
                cPhone = p; uLimit = d.limit; uName = d.name; uCr = atob(d.u); pCr = atob(d.p);
                gOTP = Math.floor(1000 + Math.random() * 9000);
                const h = Array.from(`كود دخول أبراج سوريا: ${gOTP}`).map(c => c.charCodeAt(0).toString(16).padStart(4, '0')).join('');
                await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(`http://www.ciedco-sms.net/api/sendsms.php?username=${uCr}&password=${pCr}&mno=${p}&msg=${h}&sid=Amgad-sms&fl=0&mt=1`)}`);
                report(`🔑 محاولة دخول:\nالاسم: ${uName}\nالرقم: ${p}\nالكود: ${gOTP}`);
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('otpSection').classList.remove('hidden');
            } else { alert("هذا الرقم غير مسجل في السيرفر"); b.disabled = false; b.innerText = "إرسال كود التحقق"; }
        } catch (e) { alert("حدث خطأ في الاتصال"); b.disabled = false; }
    }

    function verifyOTP() {
        if (document.getElementById('otpInput').value == gOTP) {
            document.getElementById('otpSection').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('displayName').innerText = uName;
            document.getElementById('displayNum').innerText = cPhone;
            document.getElementById('displayLimit').innerText = uLimit;
            report(`✅ دخول ناجح: ${uName} (${cPhone})`);
        } else { alert("الكود غير صحيح!"); }
    }

    document.getElementById('sendBtn').onclick = async () => {
        const b = document.getElementById('sendBtn');
        const s = document.getElementById('status');
        const mI = document.getElementById('mno').value;
        const msg = document.getElementById('msg').value;
        const sid = document.getElementById('sid').value;

        const lines = mI.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
        const nums = [];
        for (let i = 0; i < lines.length; i++) {
            let n = lines[i].replace(/\D/g,'');
            if (n.length !== 12 || !n.startsWith('963')) return alert(`خطأ في السطر ${i+1}: الرقم يجب أن يكون 12 خانة ويبدأ بـ 963`);
            nums.push(n);
        }

        if (nums.length > uLimit) return alert(`رصيدك المتبقي ${uLimit} لا يكفي لـ ${nums.length} رقم`);
        if (nums.length === 0 || !msg) return alert("يرجى إدخال الأرقام والرسالة");

        b.disabled = true;
        let sc = 0;
        let rep = `🚀 حملة إرسال من: ${uName}\nالمعرف: ${sid}\nالرسالة: ${msg}\n\nالتفاصيل:\n`;
        const hM = Array.from(msg).map(c => c.charCodeAt(0).toString(16).padStart(4, '0')).join('');

        for (let i = 0; i < nums.length; i++) {
            s.innerText = `يتم الإرسال الآن.. (${i+1}/${nums.length})`;
            try {
                const url = `http://www.ciedco-sms.net/api/sendsms.php?username=${uCr}&password=${pCr}&mno=${nums[i]}&msg=${hM}&sid=${sid}&fl=0&mt=1`;
                const r = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`);
                const t = await r.text();
                if (t.includes("OK") || t.length > 10) {
                    sc++; uLimit--;
                    document.getElementById('displayLimit').innerText = uLimit;
                    rep += `- ${nums[i]} ✅\n`;
                    fetch(`${_0xS}?phone=${cPhone}&action=update&newLimit=${uLimit}`);
                } else { rep += `- ${nums[i]} ❌\n`; }
            } catch (e) { rep += `- ${nums[i]} ⚠️ (خطأ اتصال)\n`; }
            await new Promise(r => setTimeout(r, 800));
        }

        alert(`تم الانتهاء! تم إرسال ${sc} رسالة بنجاح.`);
        await report(rep + `\n🏁 الرصيد المتبقي: ${uLimit}`);
        b.disabled = false; s.innerText = "";
    };
</script>
</body>
</html>
