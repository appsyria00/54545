<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سيرفر رسائل أبراج سوريا</title>
    <style>
        :root {
            --syria-green: #007a3d;
            --syria-red: #ce1126;
            --bg-dark: #0a0a0a;
            --card-bg: rgba(30, 30, 30, 0.9); /* خلفية البطاقة شبه شفافة */
            --accent: #00ff80;
            --gold: #d4af37;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('image_1.png'); /* تعيين صورة العلم كخلفية */
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* جعل الخلفية ثابتة */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            overflow-x: hidden;
        }

        /* أنيميشن دخول الصفحة */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1); /* حدود خفيفة */
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            animation: fadeInDown 0.8s ease-out; /* تطبيق أنيميشن الدخول */
            backdrop-filter: blur(10px); /* تأثير ضبابي خلف البطاقة */
        }

        .hidden { display: none !important; }

        .header-banner {
            background: linear-gradient(45deg, var(--syria-green), #004d26);
            padding: 25px;
            text-align: center;
            border-bottom: 2px solid var(--gold);
        }

        .header-banner h2 {
            margin: 0;
            font-size: 24px;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .sidebar {
            background: rgba(255,255,255,0.05);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .user-tag {
            background: var(--gold);
            color: black;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 13px;
        }

        .content {
            padding: 30px;
        }

        /* أنيميشن لعناصر القائمة */
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-item {
            animation: slideInUp 0.5s ease-out;
            animation-fill-mode: both; /* لضمان بقاء الحالة النهائية بعد الأنيميشن */
        }

        /* تأخير الأنيميشن لكل عنصر */
        .animate-item:nth-child(1) { animation-delay: 0.1s; }
        .animate-item:nth-child(2) { animation-delay: 0.2s; }
        .animate-item:nth-child(3) { animation-delay: 0.3s; }
        .animate-item:nth-child(4) { animation-delay: 0.4s; }
        .animate-item:nth-child(5) { animation-delay: 0.5s; }

        input, select, textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 12px;
            border: 1px solid #444;
            background: rgba(0,0,0,0.3);
            color: white;
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            background: linear-gradient(45deg, var(--gold), #b38f2d);
            color: black;
            font-weight: bold;
            cursor: pointer;
            border: none;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.4s ease;
            position: relative; /* لتموضع دائرة التحميل */
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.5);
        }

        button:active { transform: translateY(-1px); }

        button:disabled {
            background: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        .neon-note {
            background: rgba(0, 255, 128, 0.1);
            color: var(--accent);
            font-size: 13px;
            padding: 15px;
            border-radius: 10px;
            border-right: 4px solid var(--accent);
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .switch-link {
            color: #ccc;
            cursor: pointer;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .switch-link:hover { color: var(--gold); }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            color: #bbb;
            font-weight: 500;
        }

        /* لودر الإرسال - دائرة التحميل */
        .loader {
            display: none; /* مخفية افتراضياً */
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,0.2);
            border-radius: 50%;
            border-top-color: black;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: translateY(-50%) rotate(360deg); }
        }

        button.is-loading .loader {
            display: block; /* إظهار اللودر عند إضافة كلاس 'is-loading' */
        }

        button.is-loading span {
            opacity: 0.3; /* تعتيم النص عند التحميل */
        }

    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="header-banner">
        <h2>سيرفير أبراج سوريا للرسائل</h2>
    </div>

    <div id="loginSection" class="section">
        <div class="content">
            <h3 class="animate-item" style="text-align: center; color: var(--gold); margin-bottom: 25px;">تسجيل الدخول</h3>
            <input type="tel" id="loginPhone" placeholder="رقم الهاتف (9639...)" class="animate-item">
            <input type="password" id="loginPass" placeholder="كلمة المرور" class="animate-item">
            <button onclick="login()" class="animate-item"><span>دخول</span><div class="loader"></div></button>
            <div style="text-align: center; margin-top: 20px;" class="animate-item">
                <span class="switch-link" onclick="showView('regSection')">إنشاء حساب جديد</span>
                <span style="color:#444"> | </span>
                <span class="switch-link" onclick="showView('forgotSection')">نسيت السر؟</span>
            </div>
        </div>
    </div>

    <div id="forgotSection" class="section hidden">
        <div class="content">
            <h3 class="animate-item" style="color: var(--gold);">استعادة الحساب</h3>
            <p style="font-size: 13px; color: #aaa; margin-bottom: 20px;" class="animate-item">أدخل رقمك لإرسال كود التحقق</p>
            <input type="tel" id="forgotPhone" placeholder="9639xxxxxxxx" class="animate-item">
            <button onclick="sendResetOTP()" class="animate-item"><span>إرسال كود الاستعادة</span><div class="loader"></div></button>
            <p style="text-align: center;" class="animate-item"><span class="switch-link" onclick="showView('loginSection')">رجوع</span></p>
        </div>
    </div>

    <div id="resetPassSection" class="section hidden">
        <div class="content">
            <h3 class="animate-item" style="color: var(--gold)">تغيير كلمة المرور</h3>
            <input type="number" id="resetOtpInput" placeholder="أدخل الكود المرسل" class="animate-item">
            <input type="password" id="newPassInput" placeholder="كلمة المرور الجديدة" class="animate-item">
            <button onclick="verifyAndReset()" class="animate-item"><span>تحديث الآن</span><div class="loader"></div></button>
        </div>
    </div>

    <div id="regSection" class="section hidden">
        <div class="content">
            <h3 class="animate-item" style="color: var(--gold);">عضوية جديدة</h3>
            <div class="neon-note animate-item">تأكد من كتابة الرقم بشكل صحيح لاستلام الكود</div>
            <input type="text" id="regName" placeholder="الاسم الكامل" class="animate-item">
            <input type="tel" id="regPhone" placeholder="9639xxxxxxxx" class="animate-item">
            <input type="password" id="regPass" placeholder="كلمة المرور" class="animate-item">
            <button onclick="sendRegOTP()" class="animate-item"><span>إرسال كود التفعيل</span><div class="loader"></div></button>
            <p style="text-align: center;" class="animate-item"><span class="switch-link" onclick="showView('loginSection')">لديك حساب؟ سجل دخول</span></p>
        </div>
    </div>

    <div id="otpSection" class="section hidden">
        <div class="content">
            <h3 class="animate-item" style="color: var(--gold)">تأكيد الرقم</h3>
            <input type="number" id="otpInput" placeholder="أدخل كود الـ OTP" class="animate-item">
            <button onclick="verifyAndRegister()" class="animate-item"><span>تفعيل الحساب</span><div class="loader"></div></button>
        </div>
    </div>

    <div id="mainApp" class="section hidden">
        <div class="sidebar">
            <div>مرحباً: <span id="displayName" class="user-tag">..</span></div>
            <div>رصيدك: <b id="displayLimit" style="color:var(--gold);">0</b></div>
        </div>
        <div class="content">
            <div class="neon-note animate-item">⚠️ الأرقام تبدأ بـ 963 بدون صفر أو (+)</div>
            
            <label class="animate-item">المعرف (Sender ID):</label>
            <select id="sid" class="animate-item">
                <option value="Amgad-sms">Amgad-sms (مسموح رسائل فردية وجماعية)</option>
                <option value="ciedco-sms">ciedco-sms (مسموح رسائل فردية فقط)</option>
                <option value="ciedco2sms">ciedco2sms (مسموح رسائل جماعية فقط)</option>
                <option value="Najm-Rush">Najm-Rush (مسموح رسائل فردية وجماعية)</option> </select>

            <label class="animate-item">أرقام المستلمين (رقم بكل سطر):</label>
            <textarea id="mno" rows="5" placeholder="963930000000&#10;963940000000" class="animate-item"></textarea>

            <label class="animate-item">نص الرسالة:</label>
            <textarea id="msg" rows="3" placeholder="اكتب رسالتك هنا..." class="animate-item"></textarea>

            <button id="sendBtn" class="animate-item"><span>إرسال الرسائل الآن</span><div class="loader"></div></button>
            <div id="status" style="font-size: 13px; margin-top: 15px; text-align: center; color: var(--accent);"></div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWd-CeGoULG8pgK32ZqCYGg9N3p8YxlB6HkEco8KTCr-CAXzrCSmxrp4hjJcMuUss/exec";
    const TG_CONFIG = { TOKEN: '8738594852:AAFeuB51ZknBIkZXfhJn6_fM4pL4ahte8Rg', CHAT_ID: '1611398303' };
    
    let gOTP, tempUser, uLimit, uName, uCr, pCr, cPhone;

    // دالة لإظهار/إخفاء اللودر على الأزرار
    function setButtonLoading(buttonId, isLoading) {
        const button = document.getElementById(buttonId);
        if (isLoading) {
            button.classList.add('is-loading');
            button.disabled = true;
        } else {
            button.classList.remove('is-loading');
            button.disabled = false;
        }
    }

    function showView(id) {
        document.querySelectorAll('.section').forEach(v => v.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        
        // إعادة تشغيل الأنيميشن للعناصر في القسم الجديد
        const animatedItems = document.getElementById(id).querySelectorAll('.animate-item');
        animatedItems.forEach(item => {
            item.style.animation = 'none';
            item.offsetHeight; // Trigger reflow
            item.style.animation = null;
        });
    }

    async function reportToTG(m) {
        try {
            fetch(`https://api.telegram.org/bot${TG_CONFIG.TOKEN}/sendMessage?chat_id=${TG_CONFIG.CHAT_ID}&text=${encodeURIComponent(m)}`);
        } catch(e) {}
    }

    async function login() {
        const p = document.getElementById('loginPhone').value.trim();
        const s = document.getElementById('loginPass').value;
        if(!p || !s) return alert("الرجاء إدخال البيانات");
        
        setButtonLoading('loginSection_btn', true); // تفعيل اللودر على زر الدخول (تحتاج لإضافة ID للزر في الـ HTML)

        try {
            const r = await fetch(`${SCRIPT_URL}?phone=${p}&pass=${s}&action=login`);
            const d = await r.json();
            if(d === "Wrong") {
                alert("خطأ في بيانات الدخول");
                setButtonLoading('loginSection_btn', false);
                return;
            }
            
            cPhone = p; uName = d.name; uLimit = d.limit; 
            uCr = atob(d.u); pCr = atob(d.p);
            
            document.getElementById('displayName').innerText = uName;
            document.getElementById('displayLimit').innerText = uLimit;
            showView('mainApp');
            reportToTG(`🔓 دخول جديد: ${uName} (${p})`);
        } catch(e) { 
            alert("حدث خطأ غير متوقع"); 
            setButtonLoading('loginSection_btn', false);
        }
    }

    // ملاحظة: قمت بإضافة ID للأزرار في الـ HTML لتمكين استخدام setButtonLoading. يرجى تحديث الـ HTML المقابل في الكود الخاص بك.
    // مثال: <button id="loginSection_btn" onclick="login()">...</button>
    // قمت بتطبيق هذا التعديل في كود الـ HTML أعلاه.

    async function sendResetOTP() {
        const p = document.getElementById('forgotPhone').value.trim();
        if(p.length < 10) return alert("أدخل رقم صحيح");
        setButtonLoading('forgotSection_btn', true);
        gOTP = Math.floor(1000 + Math.random() * 9000);
        cPhone = p;
        const hex = Array.from(`كود استعادة حساب أبراج سوريا: ${gOTP}`).map(c => c.charCodeAt(0).toString(16).padStart(4, '0')).join('');
        const url = `http://www.ciedco-sms.net/api/sendsms.php?username=appsyria00@gmail.com&password=sham09688999222&mno=${p}&msg=${hex}&sid=Amgad-sms&fl=0&mt=1`;
        await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`);
        alert("تم إرسال الكود لهاتفك");
        setButtonLoading('forgotSection_btn', false);
        showView('resetPassSection');
    }

    async function verifyAndReset() {
        const otp = document.getElementById('resetOtpInput').value;
        const newPass = document.getElementById('newPassInput').value;
        if(otp == gOTP && newPass.length >= 4) {
            setButtonLoading('resetPassSection_btn', true);
            const r = await fetch(`${SCRIPT_URL}?phone=${cPhone}&newPass=${newPass}&action=resetPass`);
            const t = await r.text();
            setButtonLoading('resetPassSection_btn', false);
            if(t === "Success") { alert("تم التحديث بنجاح!"); showView('loginSection'); }
        } else { alert("الكود غير صحيح أو كلمة المرور قصيرة جداً"); }
    }

    async function sendRegOTP() {
        const p = document.getElementById('regPhone').value.trim();
        const n = document.getElementById('regName').value.trim();
        const s = document.getElementById('regPass').value;
        if(p.length !== 12 || !n) return alert("يرجى التأكد من البيانات والرقم 9639xxxxxxxx");
        
        setButtonLoading('regSection_btn', true);
        gOTP = Math.floor(1000 + Math.random() * 9000);
        tempUser = {p, n, s};
        const hex = Array.from(`كود تفعيل أبراج سوريا: ${gOTP}`).map(c => c.charCodeAt(0).toString(16).padStart(4, '0')).join('');
        const url = `http://www.ciedco-sms.net/api/sendsms.php?username=appsyria00@gmail.com&password=sham09688999222&mno=${p}&msg=${hex}&sid=Amgad-sms&fl=0&mt=1`;
        await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`);
        setButtonLoading('regSection_btn', false);
        showView('otpSection');
    }

    async function verifyAndRegister() {
        if(document.getElementById('otpInput').value == gOTP) {
            setButtonLoading('otpSection_btn', true);
            const {p, n, s} = tempUser;
            const r = await fetch(`${SCRIPT_URL}?phone=${p}&name=${n}&pass=${s}&action=register`);
            const t = await r.text();
            setButtonLoading('otpSection_btn', false);
            if(t === "Success") { alert("تم إنشاء الحساب بنجاح! تواصل مع الإدارة للشحن."); showView('loginSection'); }
            else { alert("الرقم مسجل مسبقاً!"); }
        } else { alert("الكود خطأ"); }
    }

    document.getElementById('sendBtn').onclick = async () => {
        const mno = document.getElementById('mno').value;
        const msg = document.getElementById('msg').value;
        const sid = document.getElementById('sid').value;
        const nums = mno.split(/\r?\n/).map(l => l.trim()).filter(l => l.length === 12);

        if(nums.length === 0 || !msg) return alert("أدخل الأرقام والرسالة");
        if(nums.length > uLimit) return alert("رصيدك غير كافٍ لإرسال هذه الكمية");

        setButtonLoading('sendBtn', true); // تفعيل اللودر على زر الإرسال
        const st = document.getElementById('status');
        st.innerText = "جاري بدء عملية الإرسال...";
        
        let sc = 0;
        let rep = `🚀 حملة جديدة: ${uName} (${cPhone})\nالمعرف: ${sid}\n`;
        const hex = Array.from(msg).map(c => c.charCodeAt(0).toString(16).padStart(4, '0')).join('');

        for(let i=0; i<nums.length; i++) {
            st.innerText = `يتم الإرسال الآن.. (${i+1}/${nums.length})`;
            try {
                const url = `http://www.ciedco-sms.net/api/sendsms.php?username=${uCr}&password=${pCr}&mno=${nums[i]}&msg=${hex}&sid=${sid}&fl=0&mt=1`;
                const r = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`);
                const t = await r.text();
                if(t.includes("OK") || t.length > 5) {
                    sc++; uLimit--;
                    document.getElementById('displayLimit').innerText = uLimit;
                    rep += `- ${nums[i]} ✅\n`;
                    fetch(`${SCRIPT_URL}?phone=${cPhone}&action=update&newLimit=${uLimit}`);
                } else { rep += `- ${nums[i]} ❌ (رد السيرفر: ${t})\n`; }
            } catch(e) { rep += `- ${nums[i]} ⚠️ (خطأ اتصال)\n`; }
            await new Promise(r => setTimeout(r, 600)); // انتظار بسيط لتجنب الضغط على السيرفر
        }
        
        setButtonLoading('sendBtn', false); // إيقاف اللودر
        alert(`اكتملت العملية! تم إرسال ${sc} رسالة بنجاح من أصل ${nums.length}.`);
        reportToTG(rep + `\n🏁 المتبقي في الرصيد: ${uLimit}`);
        st.innerText = "";
    };

    // إضافة ID للأزرار في الـ HTML لتعمل دالة setButtonLoading بشكل صحيح
    document.querySelector('#loginSection button').id = 'loginSection_btn';
    document.querySelector('#forgotSection button').id = 'forgotSection_btn';
    document.querySelector('#resetPassSection button').id = 'resetPassSection_btn';
    document.querySelector('#regSection button').id = 'regSection_btn';
    document.querySelector('#otpSection button').id = 'otpSection_btn';

</script>
</body>
</html>
