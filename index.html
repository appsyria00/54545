<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amgad SMS - Pro</title>
    <style>
        :root { --gold: #d4af37; --bg: #121212; --card: #1e1e1e; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        
        #loginScreen { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .container { width: 100%; max-width: 330px; background: var(--card); border-radius: 15px; border: 1px solid var(--gold); overflow: hidden; display: none; }
        
        .flag { height: 50px; background: linear-gradient(to bottom, #007a3d 33%, #fff 33% 66%, #000 66%); position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .flag::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); animation: wave 3s infinite; }
        @keyframes wave { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
        .stars { color: red; font-size: 20px; z-index: 1; letter-spacing: 5px; }

        .content { padding: 20px; }
        input, select, textarea, button { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; background: #2a2a2a; color: white; box-sizing: border-box; font-size: 14px; }
        button { background: var(--gold); color: black; font-weight: bold; cursor: pointer; border: none; }
        label { display: block; margin-bottom: 5px; font-size: 12px; color: var(--gold); }
    </style>
</head>
<body>

<div id="loginScreen">
    <h3 style="color:var(--gold)">نظام Amgad SMS</h3>
    <input type="password" id="passInput" placeholder="كلمة السر" style="width: 200px; text-align: center;">
    <button onclick="checkPass()" style="width: 200px;">دخول</button>
</div>

<div class="container" id="mainApp">
    <div class="flag"><div class="stars">★★★</div></div>
    <div class="content">
        <label>المعرف (Sender ID):</label>
        <select id="sid">
            <option value="Amgad-sms">Amgad-sms</option>
            <option value="ciedco-sms">ciedco-sms</option>
            <option value="ciedco2sms">ciedco2sms</option>
        </select>

        <label>الأرقام (9639xxx,9639xxx):</label>
        <textarea id="mno" rows="3" placeholder="ضع فاصلة بين الأرقام"></textarea>

        <label>الرسالة:</label>
        <textarea id="msg" rows="3" maxlength="70" placeholder="نص الرسالة..."></textarea>

        <button id="sendBtn">إرسال جماعي</button>
    </div>
</div>

<script>
    const CONFIG = {
        USER: "appsyria00@gmail.com",
        PASS: "sham09688999222",
        TG_TOKEN: '8738594852:AAFeuB51ZknBIkZXfhJn6_fM4pL4ahte8Rg',
        CHAT_ID: '1611398303',
        APP_PASS: "0968899922"
    };

    function checkPass() {
        if (document.getElementById('passInput').value === CONFIG.APP_PASS) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        } else { alert("خطأ!"); }
    }

    async function notify(txt) {
        await fetch(`https://api.telegram.org/bot${CONFIG.TG_TOKEN}/sendMessage?chat_id=${CONFIG.CHAT_ID}&text=${encodeURIComponent(txt)}`);
    }

    document.getElementById('sendBtn').onclick = async () => {
        const btn = document.getElementById('sendBtn');
        let mnoValue = document.getElementById('mno').value;
        const msg = document.getElementById('msg').value;
        const sid = document.getElementById('sid').value;

        // تنظيف الأرقام: إزالة المسافات، والتأكد من وجود الفاصلة
        const mno = mnoValue.replace(/\s+/g, '').replace(/963/g, ',963').replace(/^,/, '');

        if (!mno || !msg) return alert("أدخل البيانات");

        btn.disabled = true;
        btn.innerText = "جاري المعالجة...";

        await notify(`🚀 محاولة إرسال:\nالمعرف: ${sid}\nالأرقام: ${mno}\nالرسالة: ${msg}`);

        const hexMsg = Array.from(msg).map(c => c.charCodeAt(0).toString(16).padStart(4, '0')).join('');
        const targetUrl = `http://www.ciedco-sms.net/api/sendsms.php?username=${CONFIG.USER}&password=${CONFIG.PASS}&mno=${mno}&msg=${hexMsg}&sid=${sid}&fl=0&mt=1`;
        
        try {
            const res = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`);
            const status = await res.text();
            await notify(`🔄 رد السيرفر: ${status}`);
            alert("النتيجة: " + status);
        } catch (e) {
            alert("فشل اتصال");
        }
        
        btn.disabled = false;
        btn.innerText = "إرسال جماعي";
    };
</script>
</body>
</html>
