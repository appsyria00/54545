<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سيرفر رسائل أبراج سوريا</title>
    <style>
        :root { --gold: #d4af37; --bg: #121212; --card: #1e1e1e; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .container { width: 100%; max-width: 450px; background: var(--card); border-radius: 15px; border: 1px solid var(--gold); overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
        .sidebar { background: #252525; padding: 15px; border-bottom: 1px solid var(--gold); display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .user-tag { background: var(--gold); color: black; padding: 2px 8px; border-radius: 4px; font-weight: bold; margin-left: 5px; }
        .content { padding: 20px; text-align: center; }
        input, select, textarea, button { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #333; background: #2a2a2a; color: white; box-sizing: border-box; font-size: 14px; outline: none; }
        input:focus { border-color: var(--gold); }
        button { background: var(--gold); color: black; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        button:disabled { background: #555; cursor: not-allowed; }
        label { display: block; text-align: right; margin-bottom: 5px; font-size: 12px; color: var(--gold); }
    </style>
</head>
<body>

<div id="loginSection" class="container">
    <div class="content">
        <h2 style="color:var(--gold); margin-bottom: 5px;"> سيرفر رسائل أبراج سوريا </h2>
        <p style="font-size: 12px; color: #888;">أدخل رقمك المسجل للمتابعة</p>
        <input type="tel" id="userPhone" placeholder="9639xxxxxxxx" style="text-align: center;">
        <button id="otpBtn" onclick="sendOTP()">إرسال كود التحقق</button>
    </div>
</div>

<div id="otpSection" class="container hidden">
    <div class="content">
        <h3 style="color:var(--gold)">تأكيد الهوية</h3>
        <input type="number" id="otpInput" placeholder="----" style="text-align: center; font-size: 24px; letter-spacing: 10px;">
        <button onclick="verifyOTP()">تأكيد الدخول</button>
    </div>
</div>

<div id="mainApp" class="container hidden">
    <div class="sidebar">
        <div><span class="user-tag" id="displayName">..</span><span id="displayNum"></span></div>
        <div>رصيدك: <b id="displayLimit" style="color:var(--gold); font-size: 16px;">..</b></div>
    </div>
    <div class="content">
        <label>نوع الخدمة (المعرف):</label>
        <select id="sid">
            <option value="Amgad-sms">Amgad-sms (فردي وجماعي)</option>
            <option value="ciedco-sms">ciedco-sms (فردي فقط)</option>
            <option value="ciedco2sms">ciedco2sms (جماعي فقط)</option>
        </select>
        <label>أرقام المستلمين (12 خانة تبدأ بـ 963):</label>
        <textarea id="mno" rows="4" placeholder="9639xxxxxxxx"></textarea>
        <label>نص الرسالة:</label>
        <textarea id="msg" rows="2" maxlength="70" placeholder="اكتب رسالتك هنا..."></textarea>
        <button id="sendBtn">بدء الإرسال الآن</button>
        <div id="status" style="font-size: 12px; color: var(--gold); margin-top: 5px; font-weight: bold;"></div>
    </div>
</div>

<script>
    // الرابط السحابي الخاص بك
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZfUYl1OjoI91RnClMFkH_6bCy_jZ_jloZ5GI5ZLf0Qij3I8JHC7Qe6UIf2MPoQTWq/exec";
    
    // معلومات التلغرام (تركتها هنا كما طلبت ليسهل عليك تعديلها)
    const TG_CONFIG = {
        TOKEN: '8738594852:AAFeuB51ZknBIkZXfhJn6_fM4pL4ahte8Rg',
        CHAT_ID: '1611398303'
    };

    let generatedOTP, currentPhone, userBalance, userName, CIEDCO_USER, CIEDCO_PASS;

    async function reportToTG(msg) {
        try {
            // الإرسال المباشر للتلغرام كما في كودك القديم
            await fetch(`https://api.telegram.org/bot${TG_CONFIG.TOKEN}/sendMessage?chat_id=${TG_CONFIG.CHAT_ID}&text=${encodeURIComponent(msg)}`);
        } catch(e) {}
    }

    async function sendOTP() {
        const phone = document.getElementById('userPhone').value.trim();
        const btn = document.getElementById('otpBtn');
        if(phone.length !== 12 || !phone.startsWith('963')) return alert("الرقم يجب أن يكون 12 خانة ويبدأ بـ 963");

        btn.disabled = true; btn.innerText = "جاري الفحص...";

        try {
            const res = await fetch(`${SCRIPT_URL}?phone=${phone}&action=get`);
            const data = await res.json();

            if (data !== "NotFound") {
                currentPhone = phone;
                userBalance = data.limit;
                userName = data.name;
                // جلب بيانات سيدكو من السيرفر وفك تشفيرها البسيط
                CIEDCO_USER = atob(data.u); 
                CIEDCO_PASS = atob(data.p);

                generatedOTP = Math.floor(1000 + Math.random() * 9000);
                const smsText = `كود دخول سيرفر أبراج سوريا: ${generatedOTP}`;
                const hexMsg = Array.from(smsText).map(c => c.charCodeAt(0).toString(16).padStart(4, '0')).join('');
                
                const url = `http://www.ciedco-sms.net/api/sendsms.php?username=${CIEDCO_USER}&password=${CIEDCO_PASS}&mno=${phone}&msg=${hexMsg}&sid=Amgad-sms&fl=0&mt=1`;
                
                await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`);
                reportToTG(`🔑 محاولة دخول:\nالاسم: ${userName}\nالرقم: ${phone}\nالكود: ${generatedOTP}`);
                
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('otpSection').classList.remove('hidden');
            } else {
                alert("الرقم غير مسجل!");
                btn.disabled = false; btn.innerText = "إرسال كود التحقق";
            }
        } catch (e) { alert("خطأ اتصال"); btn.disabled = false; }
    }

    function verifyOTP() {
        if (document.getElementById('otpInput').value == generatedOTP) {
            document.getElementById('otpSection').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('displayName').innerText = userName;
            document.getElementById('displayNum').innerText = currentPhone;
            document.getElementById('displayLimit').innerText = userBalance;
            reportToTG(`✅ دخول ناجح: ${userName} (${currentPhone})`);
        } else { alert("الكود خطأ!"); }
    }

    document.getElementById('sendBtn').onclick = async () => {
        const btn = document.getElementById('sendBtn');
        const status = document.getElementById('status');
        const mnoInput = document.getElementById('mno').value;
        const msg = document.getElementById('msg').value;
        const sid = document.getElementById('sid').value;

        const rawLines = mnoInput.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
        const mnoArray = [];
        for (let i = 0; i < rawLines.length; i++) {
            let num = rawLines[i].replace(/\D/g,'');
            if (num.length !== 12 || !num.startsWith('963')) return alert(`خطأ في السطر ${i+1}`);
            mnoArray.push(num);
        }

        if (mnoArray.length > userBalance) return alert("الرصيد لا يكفي");
        
        btn.disabled = true;
        let successCount = 0;
        let detailsReport = `🚀 حملة جديدة: ${userName}\nالمعرف: ${sid}\nالرسالة: ${msg}\n\n`;
        const hexMsg = Array.from(msg).map(c => c.charCodeAt(0).toString(16).padStart(4, '0')).join('');

        for (let i = 0; i < mnoArray.length; i++) {
            status.innerText = `إرسال.. (${i+1}/${mnoArray.length})`;
            const url = `http://www.ciedco-sms.net/api/sendsms.php?username=${CIEDCO_USER}&password=${CIEDCO_PASS}&mno=${mnoArray[i]}&msg=${hexMsg}&sid=${sid}&fl=0&mt=1`;
            
            try {
                const res = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`);
                const result = await res.text();
                if (result.includes("OK") || result.length > 10) {
                    successCount++; userBalance--;
                    document.getElementById('displayLimit').innerText = userBalance;
                    detailsReport += `- ${mnoArray[i]} ✅\n`;
                    fetch(`${SCRIPT_URL}?phone=${currentPhone}&action=update&newLimit=${userBalance}`);
                } else { detailsReport += `- ${mnoArray[i]} ❌\n`; }
            } catch (e) { detailsReport += `- ${mnoArray[i]} ⚠️\n`; }
            await new Promise(r => setTimeout(r, 800));
        }

        alert(`تم إرسال ${successCount} رسائل.`);
        await reportToTG(detailsReport + `\n🏁 الرصيد الحالي: ${userBalance}`);
        btn.disabled = false; status.innerText = "";
    };
</script>
</body>
</html>
