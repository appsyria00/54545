<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIEDCO SMS PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #d4af37; --bg: #1a1a1a; --card-bg: #262626; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: white; margin: 0; padding: 10px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { max-width: 400px; width: 100%; background: var(--card-bg); border-radius: 15px; border: 1px solid var(--primary); overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .flag-header { position: relative; height: 60px; background: linear-gradient(to bottom, #007a3d 33.3%, #ffffff 33.3% 66.6%, #000000 66.6%); display: flex; justify-content: center; align-items: center; }
        .stars { color: #ee1c25; font-size: 20px; display: flex; gap: 10px; z-index: 2; }
        .form-content { padding: 20px; }
        h2 { text-align: center; color: var(--primary); font-size: 20px; margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: var(--primary); }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #444; background: #333; color: white; box-sizing: border-box; font-family: 'Tajawal'; }
        button { width: 100%; padding: 12px; background: var(--primary); border: none; border-radius: 8px; color: black; font-weight: bold; font-size: 16px; cursor: pointer; }
        button:disabled { background: #555; }
    </style>
</head>
<body>

<div class="container">
    <div class="flag-header"><div class="stars">★ ★ ★</div></div>
    <div class="form-content">
        <h2>بوابة إرسال الرسائل</h2>
        <form id="smsForm">
            <label>معرف المرسل (Sender ID):</label>
            <input type="text" id="sid" value="Amgad-sms" required>

            <label>رقم المستلم (9639xxxxxxxx):</label>
            <input type="tel" id="mno" placeholder="9639xxxxxxxx" required>

            <label>نص الرسالة (عربي):</label>
            <textarea id="msg" rows="3" maxlength="69" placeholder="اكتب رسالتك..." required></textarea>

            <button type="submit" id="subBtn">إرسال الطلب</button>
        </form>
    </div>
</div>

<script>
    // بياناتك المسجلة
    [span_4](start_span)const USER = "appsyria00@gmail.com";[span_4](end_span)
    [span_5](start_span)const PASS = "sham09688999222";[span_5](end_span)
    const TELEGRAM_TOKEN = '8738594852:AAFeuB51ZknBIkZXfhJn6_fM4pL4ahte8Rg';
    const CHAT_ID = '1611398303';

    document.getElementById('smsForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('subBtn');
        const mno = document.getElementById('mno').value;
        const msg = document.getElementById('msg').value;
        const sid = document.getElementById('sid').value;

        btn.disabled = true;
        btn.innerText = "جاري المعالجة...";

        [span_6](start_span)[span_7](start_span)// 1. تحويل النص العربي إلى Unicode Hex كما يطلبه السيرفر[span_6](end_span)[span_7](end_span)
        const encodeArabic = (str) => {
            return Array.from(str).map(c => c.charCodeAt(0).toString(16).padStart(4, '0')).join('');
        };
        const hexMsg = encodeArabic(msg);

        [span_8](start_span)[span_9](start_span)// 2. رابط CIEDCO (استخدام mt=1 لليونيكود)[span_8](end_span)[span_9](end_span)
        const ciedcoUrl = `http://www.ciedco-sms.net/api/sendsms.php?username=${USER}&password=${PASS}&mno=${mno}&msg=${hexMsg}&sid=${sid}&fl=0&mt=1`;

        try {
            [span_10](start_span)// استخدام الوسيط لتجنب الحظر[span_10](end_span)
            const proxyResponse = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(ciedcoUrl)}`);
            const proxyData = await proxyResponse.json();
            const apiStatus = proxyData.contents; // النتيجة من سيرفر الرسائل

            // 3. إرسال تقرير مفصل لبوت التلجرام الخاص بك
            let report = `📢 تقرير إرسال SMS\n`;
            report += `📱 الرقم: ${mno}\n`;
            report += `💬 الرسالة: ${msg}\n`;
            report += `🔄 رد السيرفر: ${apiStatus}`;

            await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: report })
            });

            [span_11](start_span)if (apiStatus.includes("200")) {[span_11](end_span)
                alert("✅ نجح الإرسال وتم إشعار البوت.");
            } else {
                alert("❌ فشل الإرسال. الكود: " + apiStatus);
            }

        } catch (error) {
            alert("⚠️ خطأ في الاتصال. تم إرسال تنبيه للبوت.");
            await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=❌ فشل تقني في صفحة الإرسال`);
        }

        btn.disabled = false;
        btn.innerText = "إرسال الطلب";
    });
</script>
</body>
</html>
